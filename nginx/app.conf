# webhoch Webseiten Vorschau — n8n.webhoch.com
server {
    listen 80;
    server_name n8n.webhoch.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name n8n.webhoch.com;

    ssl_certificate /etc/letsencrypt/live/n8n.webhoch.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.webhoch.com/privkey.pem;

    client_max_body_size 10M;

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Teaser Wildcard Subdomains — *.webseiten-werkstatt.at
server {
    listen 80;
    server_name ~^(?<subdomain>.+)\.webseiten-werkstatt\.at$;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ~^(?<subdomain>.+)\.webseiten-werkstatt\.at$;

    ssl_certificate /etc/letsencrypt/live/webseiten-werkstatt.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webseiten-werkstatt.at/privkey.pem;

    root /var/www/teasers/$subdomain;
    index index.html;

    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    location ~* ^/(analytics|tracking|pixel|beacon) {
        return 204;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /index.html;
}
